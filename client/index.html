<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyTrack - 学习追踪系统</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <h1>📚 StudyTrack</h1>
            </div>
            <div class="nav-links" id="navLinks">
                <a href="#" onclick="showPage('dashboard')">首页</a>
                <a href="#" onclick="showPage('tasks')">任务</a>
                <a href="#" onclick="showPage('profile')">个人中心</a>
                <a href="#" onclick="logout()">退出</a>
            </div>
            <div class="nav-auth" id="navAuth">
                <button class="btn btn-primary" onclick="window.location.href='login.html'">登录</button>
                <button class="btn btn-secondary" onclick="window.location.href='register.html'">注册</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Dashboard 页面 -->
        <div id="dashboardPage" class="page active">
            <div class="hero">
                <h1>欢迎来到 StudyTrack</h1>
                <p>高效管理你的学习任务，追踪学习进度</p>
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3 id="totalTasks">0</h3>
                        <p>总任务</p>
                    </div>
                    <div class="stat-card">
                        <h3 id="completedTasks">0</h3>
                        <p>已完成</p>
                    </div>
                    <div class="stat-card">
                        <h3 id="pendingTasks">0</h3>
                        <p>进行中</p>
                    </div>
                </div>
                <div class="features">
                    <div class="feature-card">
                        <h3>📝 任务管理</h3>
                        <p>创建和管理学习任务</p>
                    </div>
                    <div class="feature-card">
                        <h3>📊 进度追踪</h3>
                        <p>实时追踪学习进度</p>
                    </div>
                    <div class="feature-card">
                        <h3>🎯 目标设定</h3>
                        <p>设定并达成学习目标</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tasks 页面 -->
        <div id="tasksPage" class="page">
            <div class="tasks-container">
                <h2>我的任务</h2>
                <div class="task-form">
                    <input type="text" id="taskTitle" placeholder="输入任务标题..." required>
                    <input type="text" id="taskDescription" placeholder="任务描述（可选）">
                    <select id="taskPriority">
                        <option value="low">低优先级</option>
                        <option value="medium" selected>中优先级</option>
                        <option value="high">高优先级</option>
                    </select>
                    <button class="btn btn-primary" onclick="createTask()">添加任务</button>
                </div>
                <div id="taskList" class="task-list"></div>
            </div>
        </div>

        <!-- Profile 页面 -->
        <div id="profilePage" class="page">
            <div class="profile-container">
                <h2>个人中心</h2>
                <div id="profileInfo">
                    <p><strong>用户名：</strong><span id="profileUsername">-</span></p>
                    <p><strong>邮箱：</strong><span id="profileEmail">-</span></p>
                    <p><strong>注册时间：</strong><span id="profileCreatedAt">-</span></p>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/tasks.js"></script>
    <script src="../js/dashboard.js"></script>
</body>
</html>
