<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - StudyTrack</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <h1 onclick="window.location.href='index.html'">📚 StudyTrack</h1>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="auth-container">
            <h2>注册</h2>
            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="registerUsername" placeholder="请输入用户名" required minlength="3">
                </div>
                <div class="form-group">
                    <label>邮箱</label>
                    <input type="email" id="registerEmail" placeholder="请输入邮箱" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="registerPassword" placeholder="密码至少6位" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary btn-block">注册</button>
                <p class="auth-link">
                    已有账号？<a href="login.html">立即登录</a>
                </p>
            </form>
            <div id="registerMessage" class="message"></div>
        </div>
    </div>

    <script src="../js/register.js"></script>
</body>
</html>
